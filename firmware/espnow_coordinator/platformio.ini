; PlatformIO Project Configuration File — ESP-NOW Coordinator
;
; Flash and monitor this onto the coordinator ESP32.
; After flashing, note the MAC printed on the serial monitor and update
; COORDINATOR_MAC in the sniffer nodes' main.c to match.

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-56770399141
monitor_port = /dev/cu.usbserial-56770399141

;[env:esp32doit-devkit-v1]
;platform = espressif32
;board = esp32doit-devkit-v1
;framework = espidf
;monitor_speed = 115200

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-56770399141
monitor_port = /dev/cu.usbserial-56770399141
