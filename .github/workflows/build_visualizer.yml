name: Build IPS Visualizer

on:
  push:
    paths:
      - 'tools/visualizer/plot_positions.py'
      - 'tools/visualizer/requirements.txt'
      - 'tools/visualizer/ips_visualizer.spec'
      - '.github/workflows/build_visualizer.yml'
    tags:
      - 'v*'          # publish a release on any v* tag push
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-macos:
    name: macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r tools/visualizer/requirements.txt
          pip install pyinstaller

      - name: Build .app
        working-directory: tools/visualizer
        run: pyinstaller ips_visualizer.spec --distpath dist --workpath build --noconfirm

      - name: Zip .app bundle
        working-directory: tools/visualizer/dist
        run: zip -r "IPS-Visualizer-macOS.zip" "IPS Visualizer.app"

      - uses: actions/upload-artifact@v4
        with:
          name: IPS-Visualizer-macOS
          path: tools/visualizer/dist/IPS-Visualizer-macOS.zip

  build-windows:
    name: Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r tools/visualizer/requirements.txt
          pip install pyinstaller

      - name: Build .exe
        working-directory: tools/visualizer
        run: pyinstaller ips_visualizer.spec --distpath dist --workpath build --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: IPS-Visualizer-Windows
          path: "tools/visualizer/dist/IPS Visualizer.exe"

  release:
    name: Publish GitHub Release
    # Only run on a v* tag push — needs both builds to succeed first
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a release

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: IPS-Visualizer-macOS
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: IPS-Visualizer-Windows
          path: release-assets

      - name: Rename Windows exe for release
        run: mv "release-assets/IPS Visualizer.exe" "release-assets/IPS-Visualizer-Windows.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "IPS Visualizer ${{ github.ref_name }}"
          body: |
            ## IPS Visualizer ${{ github.ref_name }}

            Standalone desktop app for the Indoor Positioning System visualizer.
            No Python installation required.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🍎 macOS (Intel + Apple Silicon) | `IPS-Visualizer-macOS.zip` — unzip and double-click the `.app` |
            | 🪟 Windows 10/11 | `IPS-Visualizer-Windows.exe` — double-click to run |

            ### First launch
            A port-picker dialog will appear — select your coordinator's COM port and click **Connect**.
          files: |
            release-assets/IPS-Visualizer-macOS.zip
            release-assets/IPS-Visualizer-Windows.exe
          draft: false
          prerelease: false
